<!DOCTYPE html>
<html>
<head>
    <title>Love Site Admin - Secure</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #ffe6e6; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        input[type="file"], input[type="password"] { margin-bottom: 20px; width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #ddd; }
        button { padding: 12px 25px; background: #ff4d4d; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; }
        #adminSection { display: none; } /* මුලින් හංගලා තියෙන්නේ */
    </style>
</head>
<body>

    <h2 style="color: #d63384;">Admin Login</h2>

    <div class="container">
        <div id="loginSection">
            <input type="password" id="adminPass" placeholder="Password එක ගහපන්...">
            <button onclick="checkPass()">Login</button>
        </div>

        <div id="adminSection">
            <h3 style="color: #d63384;">ෆොටෝ එක දාපන්</h3>
            <input type="file" id="photoInput" accept="image/*"><br>
            <button onclick="uploadImage()" id="upBtn">Upload & Update Site</button>
            <p id="status" style="margin-top: 15px; color: #555; font-size: 14px;"></p>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBLpLXvC-mVEcA15jPgPsL7UaphpyZ648o",
            authDomain: "love-chat-a2ddc.firebaseapp.com",
            databaseURL: "https://love-chat-a2ddc-default-rtdb.firebaseio.com",
            projectId: "love-chat-a2ddc",
            storageBucket: "love-chat-a2ddc.firebasestorage.app"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Password එක Check කරන හැටි
        function checkPass() {
            const pass = document.getElementById('adminPass').value;
            if(pass === "@Rash2008") {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('adminSection').style.display = 'block';
            } else {
                alert("වැරදියි හුත්තෝ! ආයේ ගහපන්.");
            }
        }

        async function uploadImage() {
            const file = document.getElementById('photoInput').files[0];
            const status = document.getElementById('status');
            const btn = document.getElementById('upBtn');

            if(!file) return alert("කෝ ෆොටෝ එකක් තෝරපන්!");

            btn.disabled = true;
            status.innerText = "ImgBB එකට යනවා... පොඩ්ඩක් හිටපන්...";

            try {
                let formData = new FormData();
                formData.append("image", file);
                
                const response = await fetch("https://api.imgbb.com/1/upload?key=dd42c97b183295b4269661d5147fa6b8", {
                    method: "POST",
                    body: formData
                });
                
                const result = await response.json();
                
                if(result.success) {
                    const url = result.data.url;
                    await database.ref('currentPhoto').set({
                        imageUrl: url,
                        timestamp: Date.now()
                    });
                    status.innerText = "වැඩේ ගොඩ! සයිට් එක Update වුණා.";
                    alert("Done!");
                }
            } catch (error) {
                status.innerText = "Error: " + error.message;
            }
            btn.disabled = false;
        }
    </script>
</body>
</html>
