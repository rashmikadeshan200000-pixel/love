<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rashmika ❤️ Amasha</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #fff0f5; margin: 0; overflow-x: hidden; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        /* Snowfall & Trail */
        .snow { position: absolute; top: -10px; color: white; pointer-events: none; animation: fall linear infinite; z-index: 1; }
        @keyframes fall { to { transform: translateY(105vh); } }
        .trail { position: absolute; pointer-events: none; font-size: 14px; color: #ff69b4; animation: trailAnim 0.7s forwards; z-index: 1000; }
        @keyframes trailAnim { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(0); opacity: 0; } }

        /* Sections */
        #login-box, #main-content, #chat-page { text-align: center; transition: 0.5s; width: 100%; max-width: 400px; padding: 20px; }
        #main-content, #chat-page { display: none; }
        .box-card { background: rgba(255, 255, 255, 0.95); padding: 30px; border-radius: 30px; box-shadow: 0 10px 30px rgba(255, 105, 180, 0.2); }
        input { width: 85%; padding: 12px; border: 2px solid #ffb6c1; border-radius: 20px; outline: none; margin-bottom: 15px; text-align: center; font-family: inherit; }
        button { padding: 10px 25px; background: #ff4d6d; color: white; border: none; border-radius: 20px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { transform: scale(1.05); background: #e91e63; }

        /* Clock Animation */
        .clock-container { display: inline-flex; align-items: center; background: rgba(255, 255, 255, 0.8); padding: 8px 20px; border-radius: 50px; margin-top: 15px; border: 1px solid #ffb6c1; }
        .animated-clock { width: 20px; height: 20px; border: 2px solid #ff4d6d; border-radius: 50%; position: relative; margin-right: 10px; }
        .animated-clock::after, .animated-clock::before { content: ''; position: absolute; background: #ff4d6d; left: 50%; top: 50%; transform-origin: bottom center; border-radius: 5px; }
        .animated-clock::after { width: 1.5px; height: 5px; animation: rotateClock 10s linear infinite; }
        .animated-clock::before { width: 1.5px; height: 8px; animation: rotateClock 2s linear infinite; }
        @keyframes rotateClock { from { transform: translate(-50%, -100%) rotate(0deg); } to { transform: translate(-50%, -100%) rotate(360deg); } }

        /* Chat Styling */
        #chat-display { height: 350px; overflow-y: auto; background: #fff; border-radius: 15px; padding: 15px; text-align: left; margin-bottom: 15px; border: 1px solid #eee; display: flex; flex-direction: column; scroll-behavior: smooth; }
        .msg-wrapper { margin-bottom: 12px; display: flex; flex-direction: column; }
        .sender-name { font-size: 10px; font-weight: bold; margin-bottom: 2px; color: #888; }
        .msg { padding: 10px 14px; border-radius: 18px; max-width: 80%; font-size: 13px; line-height: 1.4; position: relative; }
        
        .amasha-wrapper { align-items: flex-start; }
        .amasha-msg { background: #ffe4e8; color: #d81b60; border-bottom-left-radius: 2px; }
        
        .rashmika-wrapper { align-items: flex-end; }
        .rashmika-msg { background: #ff4d6d; color: white; border-bottom-right-radius: 2px; }

        .chat-input-area { display: flex; gap: 8px; }
        #chat-input { flex: 1; padding: 10px 15px; border: 1px solid #ffb6c1; border-radius: 25px; text-align: left; margin-bottom: 0; }
        
        .romantic-quote { font-family: 'Dancing Script', cursive; color: #ff4d6d; font-size: 1.8rem; margin: 15px 0; }
        .heart-svg { width: 50px; height: 50px; fill: #ff4d6d; animation: heartBeat 1.2s infinite; filter: drop-shadow(0 0 5px rgba(255,77,109,0.5)); }
        @keyframes heartBeat { 0%, 30%, 60%, 100% { transform: scale(1); } 15%, 45% { transform: scale(1.2); } }
    </style>
</head>
<body onmousemove="createTrail(event)" ontouchmove="createTrail(event)">

    <audio id="bgMusic" loop><source src="music.mp3" type="audio/mpeg"></audio>

    <div id="login-box" class="box-card">
        <h2 style="color: #ff4d6d; font-family: 'Dancing Script', cursive; font-size: 2.5rem;">Our Secret World</h2>
        <input type="password" id="pcode" placeholder="Enter Rashmika or Amasha...">
        <br>
        <button onclick="login()">Enter ❤️</button>
    </div>

    <div id="main-content">
        <svg class="heart-svg" viewBox="0 0 32 32"><path d="M16 28.5L14.1 26.8C7.33 20.65 3 16.71 3 11.91C3 7.96 6.09 4.88 10.04 4.88C12.28 4.88 14.42 5.92 15.83 7.56C17.25 5.92 19.39 4.88 21.63 4.88C25.58 4.88 28.67 7.96 28.67 11.91C28.67 16.71 24.33 20.65 17.57 26.8L16 28.5Z"></path></svg>
        <div class="romantic-quote" id="type-text"></div>
        
        <div class="clock-container">
            <div class="animated-clock"></div>
            <div style="color: #d81b60; font-weight: bold; font-size: 14px;">Together Since <span id="days">0</span> Days</div>
        </div>
        <br><br>
        <button onclick="showChat()">Go to Our Chat ✨</button>
    </div>

    <div id="chat-page">
        <div class="box-card">
            <h3 style="color: #ff4d6d; margin-top: 0; font-family: 'Dancing Script', cursive; font-size: 1.8rem;">Our Secret Chat</h3>
            <div id="chat-display"></div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="Type a message...">
                <button onclick="sendChat()">💌</button>
            </div>
        </div>
        <button onclick="backToMain()" style="background:none; color:#888; border:none; margin-top:10px; font-size: 12px;">← Back to Gallery</button>
    </div>

    <script>
        const DB_URL = "https://love-chat-a2ddc-default-rtdb.firebaseio.com/chat.json";
        let currentUser = "";

        function login() {
            const code = document.getElementById('pcode').value.trim();
            if(code.toLowerCase() === "amasha") {
                currentUser = "Amasha 🙇‍♀️";
                proceed();
            } else if(code.toLowerCase() === "rashmika") {
                currentUser = "Rashmika 🙇‍♂️💗";
                proceed();
            } else {
                alert("Please login as 'Rashmika' or 'Amasha'! ❌");
            }
        }

        function proceed() {
            document.getElementById('login-box').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            document.getElementById('bgMusic').play();
            
            // නිවැරදි කළ දිනය: 2025-11-27
            let start = new Date("2025-11-27"); 
            let today = new Date();
            let diff = Math.floor((today - start) / (1000 * 60 * 60 * 24));
            document.getElementById('days').innerText = diff >= 0 ? diff : 0;
            
            typeWriter("I promise to love you, always... ❤️", 0);
        }

        function showChat() {
            document.getElementById('main-content').style.display = 'none';
            document.getElementById('chat-page').style.display = 'block';
            loadMessages();
            setInterval(loadMessages, 3000); 
        }

        async function sendChat() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if(!text) return;

            await fetch(DB_URL, {
                method: 'POST',
                body: JSON.stringify({ sender: currentUser, text: text, time: new Date().getTime() })
            });
            input.value = "";
            loadMessages();
        }

        async function loadMessages() {
            try {
                const res = await fetch(DB_URL);
                const data = await res.json();
                const display = document.getElementById('chat-display');
                
                if(data) {
                    let chatHTML = "";
                    Object.values(data).sort((a,b) => a.time - b.time).forEach(m => {
                        const isAmasha = m.sender.includes("Amasha");
                        chatHTML += `
                            <div class="msg-wrapper ${isAmasha ? 'amasha-wrapper' : 'rashmika-wrapper'}">
                                <div class="sender-name">${m.sender}</div>
                                <div class="msg ${isAmasha ? 'amasha-msg' : 'rashmika-msg'}">${m.text}</div>
                            </div>`;
                    });
                    display.innerHTML = chatHTML;
                    display.scrollTop = display.scrollHeight;
                }
            } catch(e) { console.log("Connecting..."); }
        }

        function createSnow() {
            const snow = document.createElement('div');
            snow.innerHTML = '❄'; snow.className = 'snow';
            snow.style.left = Math.random() * 100 + 'vw';
            snow.style.fontSize = Math.random() * 10 + 10 + 'px';
            snow.style.animationDuration = Math.random() * 3 + 2 + 's';
            document.body.appendChild(snow);
            setTimeout(() => snow.remove(), 5000);
        }
        setInterval(createSnow, 150);

        function createTrail(e) {
            const trail = document.createElement('div');
            trail.innerHTML = '✨'; trail.className = 'trail';
            const x = e.clientX || (e.touches ? e.touches[0].clientX : 0);
            const y = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            trail.style.left = x + 'px'; trail.style.top = y + 'px';
            document.body.appendChild(trail);
            setTimeout(() => trail.remove(), 700);
        }

        function typeWriter(t, i) {
            if (i < t.length) {
                document.getElementById("type-text").innerHTML += t.charAt(i);
                setTimeout(() => typeWriter(t, i + 1), 100);
            }
        }

        function backToMain() {
            document.getElementById('chat-page').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
        }
    </script>
</body>
</html>
