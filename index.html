<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Princess Amasha ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #fff0f5; margin: 0; overflow-x: hidden; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        /* Snow & Trail */
        .snow { position: absolute; top: -10px; color: white; pointer-events: none; animation: fall linear infinite; z-index: 1; }
        @keyframes fall { to { transform: translateY(105vh); } }
        .trail { position: absolute; pointer-events: none; font-size: 14px; color: #ff69b4; animation: trailAnim 0.7s forwards; z-index: 1000; }
        @keyframes trailAnim { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(0); opacity: 0; } }

        /* General Containers */
        #login-box, #main-content, #chat-page { text-align: center; transition: 0.6s ease-in-out; width: 100%; max-width: 400px; padding: 20px; position: absolute; }
        #main-content, #chat-page { display: none; opacity: 0; }

        .box-card { background: rgba(255, 255, 255, 0.95); padding: 30px; border-radius: 30px; box-shadow: 0 10px 30px rgba(255, 105, 180, 0.2); }
        input { width: 85%; padding: 12px; border: 2px solid #ffb6c1; border-radius: 20px; outline: none; margin-bottom: 15px; text-align: center; }
        button { padding: 12px 25px; background: #ff4d6d; color: white; border: none; border-radius: 25px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { transform: scale(1.05); }

        /* Photo Gallery Styling */
        .photo-frame { width: 250px; height: 300px; margin: 0 auto; border: 8px solid white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; position: relative; }
        .photo-frame img { width: 100%; height: 100%; object-fit: cover; position: absolute; left: 0; top: 0; opacity: 0; transition: 1s; }
        .photo-frame img.active { opacity: 1; animation: zoom 6s infinite alternate; }
        @keyframes zoom { from { transform: scale(1); } to { transform: scale(1.1); } }

        /* Romantic Elements */
        .romantic-quote { font-family: 'Dancing Script', cursive; color: #ff4d6d; font-size: 1.8rem; margin: 15px 0; min-height: 2.5rem; }
        .days-counter { color: #d81b60; font-weight: bold; font-size: 14px; margin-bottom: 20px; }

        /* Chat Styling */
        #chat-display { height: 300px; overflow-y: auto; background: #fff; border-radius: 15px; padding: 15px; text-align: left; margin-bottom: 15px; border: 1px solid #eee; display: flex; flex-direction: column; }
        .msg-wrapper { margin-bottom: 10px; display: flex; flex-direction: column; }
        .sender-name { font-size: 9px; font-weight: bold; margin-bottom: 2px; color: #888; }
        .msg { padding: 8px 12px; border-radius: 15px; max-width: 80%; font-size: 13px; line-height: 1.4; }
        .amasha-wrapper { align-items: flex-start; }
        .amasha-msg { background: #ffe4e8; color: #d81b60; border-bottom-left-radius: 2px; }
        .rashmika-wrapper { align-items: flex-end; }
        .rashmika-msg { background: #ff4d6d; color: white; border-bottom-right-radius: 2px; }
        .chat-input-area { display: flex; gap: 5px; }
        #chat-input { flex: 1; padding: 10px; border: 1px solid #ffb6c1; border-radius: 20px; text-align: left; margin: 0; }

        .next-btn { background: white; color: #ff4d6d; border: 2px solid #ff4d6d; font-size: 13px; margin-top: 20px; animation: glow 2s infinite; }
        @keyframes glow { 0%, 100% { box-shadow: 0 0 5px #ff4d6d; } 50% { box-shadow: 0 0 15px #ff4d6d; } }
    </style>
</head>
<body onmousemove="createTrail(event)" ontouchmove="createTrail(event)">

    <audio id="bgMusic" loop><source src="music.mp3" type="audio/mpeg"></audio>

    <div id="login-box" class="box-card">
        <h2 style="color: #ff4d6d; font-family: 'Dancing Script', cursive; font-size: 2.5rem;">Our Secret World</h2>
        <input type="password" id="pcode" placeholder="Enter Rashmika or Amasha...">
        <br>
        <button onclick="login()">Open Surprise ❤️</button>
    </div>

    <div id="main-content">
        <div class="photo-frame">
            <img src="img1.jpg" class="active">
            <img src="img2.jpg">
            <img src="img3.jpg">
        </div>
        <div class="romantic-quote" id="type-text"></div>
        <div class="days-counter">Together Since <span id="days">0</span> Days ❤️</div>
        <button class="next-btn" onclick="showChat()">Enter Our Secret Chat 💌</button>
    </div>

    <div id="chat-page">
        <div class="box-card">
            <h3 style="color: #ff4d6d; margin-top: 0; font-family: 'Dancing Script', cursive;">Secret Messages</h3>
            <div id="chat-display"></div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="Say something sweet...">
                <button onclick="sendChat()">💌</button>
            </div>
        </div>
        <button onclick="backToMain()" style="background:none; color:#888; border:none; margin-top:10px; font-size: 11px;">← Back to Gallery</button>
    </div>

    <script>
        const DB_URL = "https://love-chat-a2ddc-default-rtdb.firebaseio.com/chat.json";
        let currentUser = "";
        let quotes = [
            "You are the best thing that ever happened to me...",
            "Every moment with you is like a beautiful dream.",
            "I promise to love you, always and forever.",
            "You are my today and all of my tomorrows. ❤️"
        ];

        function login() {
            const code = document.getElementById('pcode').value.trim();
            if(code.toLowerCase() === "amasha") { currentUser = "Amasha 🙇‍♀️"; proceed(); }
            else if(code.toLowerCase() === "rashmika") { currentUser = "Rashmika 🙇‍♂️💗"; proceed(); }
            else { alert("Wrong Code! ❌"); }
        }

        function proceed() {
            fadeOutIn('login-box', 'main-content');
            document.getElementById('bgMusic').play();
            startGallery();
            
            let start = new Date("2025-11-27");
            let today = new Date();
            document.getElementById('days').innerText = Math.floor((today - start) / (1000 * 60 * 60 * 24));
            
            cycleQuotes(0);
        }

        function startGallery() {
            let imgs = document.querySelectorAll('.photo-frame img');
            let c = 0;
            setInterval(() => {
                imgs[c].classList.remove('active');
                c = (c + 1) % imgs.length;
                imgs[c].classList.add('active');
            }, 4000);
        }

        function cycleQuotes(idx) {
            let el = document.getElementById("type-text");
            el.innerHTML = "";
            let text = quotes[idx];
            let i = 0;
            function type() {
                if (i < text.length) {
                    el.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, 100);
                } else {
                    setTimeout(() => cycleQuotes((idx + 1) % quotes.length), 3000);
                }
            }
            type();
        }

        function showChat() { fadeOutIn('main-content', 'chat-page'); loadMessages(); setInterval(loadMessages, 3000); }
        function backToMain() { fadeOutIn('chat-page', 'main-content'); }

        function fadeOutIn(outId, inId) {
            let outEl = document.getElementById(outId);
            let inEl = document.getElementById(inId);
            outEl.style.opacity = '0';
            setTimeout(() => {
                outEl.style.display = 'none';
                inEl.style.display = 'block';
                setTimeout(() => inEl.style.opacity = '1', 50);
            }, 600);
        }

        async function sendChat() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if(!text) return;
            await fetch(DB_URL, { method: 'POST', body: JSON.stringify({ sender: currentUser, text: text, time: new Date().getTime() }) });
            input.value = "";
            loadMessages();
        }

        async function loadMessages() {
            try {
                const res = await fetch(DB_URL);
                const data = await res.json();
                const display = document.getElementById('chat-display');
                if(data) {
                    let html = "";
                    Object.values(data).sort((a,b) => a.time - b.time).forEach(m => {
                        const isAmasha = m.sender.includes("Amasha");
                        html += `<div class="msg-wrapper ${isAmasha ? 'amasha-wrapper' : 'rashmika-wrapper'}">
                                    <div class="sender-name">${m.sender}</div>
                                    <div class="msg ${isAmasha ? 'amasha-msg' : 'rashmika-msg'}">${m.text}</div>
                                 </div>`;
                    });
                    display.innerHTML = html;
                    display.scrollTop = display.scrollHeight;
                }
            } catch(e) {}
        }

        function createSnow() {
            const snow = document.createElement('div');
            snow.innerHTML = '❄'; snow.className = 'snow';
            snow.style.left = Math.random() * 100 + 'vw';
            snow.style.fontSize = Math.random() * 10 + 10 + 'px';
            snow.style.animationDuration = Math.random() * 3 + 2 + 's';
            document.body.appendChild(snow);
            setTimeout(() => snow.remove(), 5000);
        }
        setInterval(createSnow, 150);

        function createTrail(e) {
            const trail = document.createElement('div');
            trail.innerHTML = '✨'; trail.className = 'trail';
            const x = e.clientX || (e.touches ? e.touches[0].clientX : 0);
            const y = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            trail.style.left = x + 'px'; trail.style.top = y + 'px';
            document.body.appendChild(trail);
            setTimeout(() => trail.remove(), 700);
        }
    </script>
</body>
</html>
