<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forever Mine ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Poppins', sans-serif; 
            margin: 0; overflow: hidden; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; 
            background: radial-gradient(circle, #300000 0%, #000000 100%);
        }

        /* පාවෙන ආදර වචන */
        .floating-love { 
            position: absolute; color: rgba(255, 50, 50, 0.3); 
            font-family: 'Dancing Script', cursive; font-size: 1.2rem; 
            pointer-events: none; z-index: 1; animation: floatMove 12s linear infinite;
        }
        @keyframes floatMove {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        /* පින්තූර පාවෙන Frame එක */
        .photo-container {
            width: 200px; height: 250px; margin: 0 auto 20px;
            background: white; padding: 10px; border-radius: 5px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transform: rotate(-3deg); position: relative;
        }
        .photo-container img {
            width: 100%; height: 180px; object-fit: cover;
            display: none; animation: fadeImg 2s ease-in-out;
        }
        .photo-container img.active { display: block; }
        @keyframes fadeImg { from { opacity: 0; } to { opacity: 1; } }

        /* කාඩ් එකේ ස්ටයිල් එක */
        .box-card { 
            background: rgba(15, 0, 0, 0.85); 
            padding: 30px; border-radius: 40px; 
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.2); 
            border: 1px solid #400; text-align: center;
            width: 90%; max-width: 420px; z-index: 10;
            color: white; transition: 0.8s;
        }

        #login-box, #main-content, #chat-page { position: absolute; }
        #main-content, #chat-page { display: none; opacity: 0; }

        .letter-container {
            font-size: 14px; line-height: 1.6; text-align: left;
            margin-bottom: 20px; border-left: 3px solid #ff0000;
            padding-left: 15px; font-style: italic; color: #ffcccc;
            min-height: 100px;
        }

        input {
            width: 85%; padding: 12px; border-radius: 20px; border: 1px solid #600;
            background: #050505; color: white; text-align: center; margin-bottom: 15px;
            outline: none;
        }

        button {
            padding: 12px 35px; background: #b00; color: white; 
            border: none; border-radius: 30px; font-weight: bold; 
            cursor: pointer; box-shadow: 0 5px 15px rgba(255,0,0,0.4);
            transition: 0.3s;
        }
        button:hover { transform: scale(1.05); background: #f00; }

        /* සින්දුවට අදාළ අයිකන් එක */
        .music-note { font-size: 24px; color: #f00; animation: spin 4s linear infinite; margin-top: 10px; display: inline-block; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* චැට් */
        #chat-display { 
            height: 300px; overflow-y: auto; background: rgba(0,0,0,0.7); 
            border-radius: 20px; padding: 15px; margin-bottom: 15px;
            display: flex; flex-direction: column; gap: 10px; border: 1px solid #300;
        }
        .msg { padding: 10px 15px; border-radius: 20px; font-size: 13px; max-width: 85%; }
        .my-msg { background: linear-gradient(to right, #900, #500); align-self: flex-end; color: white; }
        .other-msg { background: #222; align-self: flex-start; color: #ff9999; border: 1px solid #400; }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div id="login-box" class="box-card">
        <h2 style="font-family: 'Dancing Script'; font-size: 2.2rem; color: #ff3333;">Our Secret Kingdom</h2>
        <input type="password" id="pcode" placeholder="Enter Magic Name...">
        <button onclick="login()">ENTER HEAVEN</button>
    </div>

    <div id="main-content" class="box-card">
        <div class="photo-container">
            <img src="img1.jpg" class="active">
            <img src="img2.jpg">
            <img src="img3.jpg">
            <p style="color:#000; font-family:'Dancing Script'; font-size:1.2rem; margin:5px 0 0 0;">Us Forever ❤️</p>
        </div>

        <div class="letter-container">
            <div id="letter-en"></div>
            <div id="letter-si" style="font-size: 11px; color: #ff7777; margin-top: 10px;"></div>
        </div>

        <div class="music-note">🎵</div>
        <br><br>
        <button onclick="showChat()">SECRET CHAT</button>
    </div>

    <div id="chat-page" class="box-card">
        <h3 style="margin:0 0 10px 0; color:#ff3333;">Secure Line</h3>
        <div id="chat-display"></div>
        <div style="display:flex; gap:8px;">
            <input type="text" id="chat-input" style="margin:0; flex:1;" placeholder="Type encrypted message...">
            <button onclick="sendChat()" style="padding:10px 20px;">💌</button>
        </div>
        <button onclick="backToMain()" style="background:none; box-shadow:none; font-size:11px; color:#555; margin-top:10px;">← BACK TO LETTER</button>
    </div>

    <script>
        const DB_URL = "https://love-chat-a2ddc-default-rtdb.firebaseio.com/ultimate_chat.json";
        let currentUser = "";
        
        const letterEn = "My love, you are my heart's only beat. No matter where we are, our souls are forever connected. You are my dream come true.";
        const letterSi = "(මගේ ආදරය, මගේ හදවතේ එකම ගැස්ම ඔබයි. අප කොතැනක සිටියත්, අපගේ ආත්මයන් සදහටම බැඳී ඇත. ඔබ මගේ සැබෑ වූ සිහිනයයි.)";
        const loveWords = ["I Love You", "Te Amo", "Je t'aime", "Aishiteru", "Ti amo", "මම ඔයාට ආදරෙයි", "Forever Mine"];

        function login() {
            const code = document.getElementById('pcode').value.trim().toLowerCase();
            if(code === "amasha" || code === "rashmika") {
                currentUser = code.charAt(0).toUpperCase() + code.slice(1);
                document.getElementById('login-box').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('login-box').style.display = 'none';
                    document.getElementById('main-content').style.display = 'block';
                    setTimeout(() => document.getElementById('main-content').style.opacity = '1', 50);
                    document.getElementById('bgMusic').play(); // සින්දුව ප්ලේ වෙනවා
                    typeLetter();
                    startLoveFlow();
                    startGallery();
                }, 800);
            } else { alert("Access Denied!"); }
        }

        function startGallery() {
            let imgs = document.querySelectorAll('.photo-container img');
            let i = 0;
            setInterval(() => {
                imgs[i].classList.remove('active');
                i = (i + 1) % imgs.length;
                imgs[i].classList.add('active');
            }, 4000);
        }

        function typeLetter() {
            let i = 0;
            const enBox = document.getElementById('letter-en');
            function type() {
                if (i < letterEn.length) {
                    enBox.innerHTML += letterEn.charAt(i);
                    i++;
                    setTimeout(type, 60);
                } else {
                    document.getElementById('letter-si').innerText = letterSi;
                }
            }
            type();
        }

        function startLoveFlow() {
            setInterval(() => {
                const div = document.createElement('div');
                div.className = 'floating-love';
                div.innerText = loveWords[Math.floor(Math.random() * loveWords.length)];
                div.style.left = Math.random() * 85 + 'vw';
                div.style.animationDuration = (Math.random() * 5 + 7) + 's';
                document.body.appendChild(div);
                setTimeout(() => div.remove(), 12000);
            }, 1500);
        }

        function showChat() {
            document.getElementById('main-content').style.display = 'none';
            document.getElementById('chat-page').style.display = 'block';
            document.getElementById('chat-page').style.opacity = '1';
            loadMessages();
            setInterval(loadMessages, 3000);
        }

        function backToMain() {
            document.getElementById('chat-page').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
        }

        async function sendChat() {
            const input = document.getElementById('chat-input');
            if(!input.value.trim()) return;
            await fetch(DB_URL, { method: 'POST', body: JSON.stringify({ sender: currentUser, text: input.value, time: Date.now() }) });
            input.value = "";
            loadMessages();
        }

        async function loadMessages() {
            const res = await fetch(DB_URL);
            const data = await res.json();
            const display = document.getElementById('chat-display');
            if(data) {
                let html = "";
                Object.values(data).sort((a,b) => a.time - b.time).forEach(m => {
                    const isMe = m.sender === currentUser;
                    html += `<div class="msg ${isMe ? 'my-msg' : 'other-msg'}"><b>${m.sender}:</b> ${m.text}</div>`;
                });
                display.innerHTML = html;
                display.scrollTop = display.scrollHeight;
            }
        }
    </script>
</body>
</html>
