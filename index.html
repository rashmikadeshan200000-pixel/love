<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forever Ours ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; outline: none; }
        body { 
            font-family: 'Poppins', sans-serif; margin: 0; overflow: hidden; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; background: radial-gradient(circle, #200000 0%, #000000 100%);
            cursor: crosshair;
        }

        /* පාවෙන වචන ඇනිමේෂන් එක */
        .floating-word { 
            position: absolute; color: rgba(255, 0, 0, 0.4); 
            font-family: 'Dancing Script', cursive; font-size: 1.8rem; 
            pointer-events: none; z-index: 1; animation: floatUp 8s linear forwards;
        }
        @keyframes floatUp {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translateY(-10vh) rotate(20deg); opacity: 0; }
        }

        /* Touch කරද්දී එන හදවත් */
        .click-heart {
            position: absolute; color: #ff0000; font-size: 20px;
            pointer-events: none; animation: heartFade 1s ease-out forwards;
            z-index: 999;
        }
        @keyframes heartFade {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: translateY(-50px) scale(2); opacity: 0; }
        }

        .box-card { 
            background: rgba(10, 0, 0, 0.9); padding: 25px; border-radius: 35px; 
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.2); border: 1px solid #400; 
            text-align: center; width: 92%; max-width: 400px; z-index: 10;
            color: white; transition: 0.5s;
        }

        #login-box, #main-content, #chat-page { position: absolute; }
        #main-content, #chat-page { display: none; opacity: 0; }

        .timer { font-size: 13px; color: #ff4d6d; margin: 15px 0; font-weight: bold; }

        .photo-frame {
            width: 180px; height: 220px; margin: 0 auto 15px; border: 5px solid white;
            border-radius: 10px; overflow: hidden; transform: rotate(-2deg);
        }
        .photo-frame img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .photo-frame img.active { display: block; animation: fadeIn 1.5s; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .letter-text { font-size: 14px; text-align: left; border-left: 2px solid #f00; padding-left: 10px; font-style: italic; color: #ffcccc; margin-bottom: 15px; }

        input { width: 85%; padding: 12px; border-radius: 20px; border: 1px solid #600; background: #000; color: white; margin-bottom: 15px; text-align: center; }
        button { padding: 12px 30px; background: #900; color: white; border: none; border-radius: 30px; font-weight: bold; cursor: pointer; box-shadow: 0 5px 15px rgba(255,0,0,0.3); }

        #chat-display { height: 250px; overflow-y: auto; background: rgba(0,0,0,0.6); border-radius: 15px; padding: 10px; margin-bottom: 10px; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 8px 12px; border-radius: 15px; font-size: 13px; max-width: 80%; }
        .my-msg { background: #b00; align-self: flex-end; }
        .other-msg { background: #333; align-self: flex-start; color: #ffaaaa; }
    </style>
</head>
<body onclick="createHeart(event)">

    <audio id="bgMusic" loop><source src="music.mp3" type="audio/mpeg"></audio>

    <div id="login-box" class="box-card">
        <h2 style="font-family: 'Dancing Script'; font-size: 2.2rem; color: #ff3333;">Our Secret Kingdom</h2>
        <input type="password" id="pcode" placeholder="Your Secret Name...">
        <button onclick="login()">Open My Heart</button>
    </div>

    <div id="main-content" class="box-card">
        <div class="photo-frame">
            <img src="img1.jpg" class="active">
            <img src="img2.jpg">
            <img src="img3.jpg">
        </div>
        
        <div class="timer" id="timer-display">Together Since...</div>

        <div class="letter-text">
            <div id="en-letter"></div>
            <div id="si-letter" style="font-size: 11px; color: #ff7777; margin-top: 8px;"></div>
        </div>

        <button onclick="showChat()">SECRET CHAT</button>
    </div>

    <div id="chat-page" class="box-card">
        <h3 style="margin:0 0 10px 0; color: #ff3333;">Private Line</h3>
        <div id="chat-display"></div>
        <div style="display:flex; gap:5px;">
            <input type="text" id="chat-input" style="margin:0; flex:1;" placeholder="Message...">
            <button onclick="sendChat()" style="padding:10px;">💌</button>
        </div>
        <button onclick="backToMain()" style="background:none; box-shadow:none; font-size:11px; color:#666; margin-top:10px;">← Back</button>
    </div>

    <script>
        const DB_URL = "https://love-chat-a2ddc-default-rtdb.firebaseio.com/final_chat.json";
        let currentUser = "";
        const romanticWords = ["Amasha", "Rashmika", "Queen", "Princess", "Forever", "I Love You", "My Life", "Together"];

        function login() {
            const code = document.getElementById('pcode').value.trim().toLowerCase();
            if(code === "amasha" || code === "rashmika") {
                currentUser = code.charAt(0).toUpperCase() + code.slice(1);
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                document.getElementById('main-content').style.opacity = '1';
                document.getElementById('bgMusic').play();
                startEverything();
            } else { alert("Wrong Access!"); }
        }

        function startEverything() {
            // පාවෙන වචන
            setInterval(() => {
                const div = document.createElement('div');
                div.className = 'floating-word';
                div.innerText = romanticWords[Math.floor(Math.random() * romanticWords.length)];
                div.style.left = Math.random() * 80 + 10 + 'vw';
                document.body.appendChild(div);
                setTimeout(() => div.remove(), 8000);
            }, 1500);

            // පින්තූර මාරු වීම
            let i = 0;
            const imgs = document.querySelectorAll('.photo-frame img');
            setInterval(() => {
                imgs[i].classList.remove('active');
                i = (i + 1) % imgs.length;
                imgs[i].classList.add('active');
            }, 4000);

            // වෙලාව (Relationship Timer) - ඔයාගේ දවස මෙතන දාන්න (Year, Month-1, Day)
            const startDate = new Date(2025, 10, 27); // 2025 නොවැම්බර් 27
            setInterval(() => {
                const now = new Date();
                const diff = now - startDate;
                const d = Math.floor(diff / (1000 * 60 * 60 * 24));
                const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
                const m = Math.floor((diff / (1000 * 60)) % 60);
                const s = Math.floor((diff / 1000) % 60);
                document.getElementById('timer-display').innerHTML = `Together Since:<br>${d}d ${h}h ${m}m ${s}s ❤️`;
            }, 1000);

            // ලියුම
            typeLetter();
        }

        function typeLetter() {
            const en = "My love, every second with you is a blessing. You are my queen and my forever.";
            const si = "(මගේ ආදරය, ඔබ සමඟ ගත කරන සෑම තත්පරයක්ම ආශිර්වාදයකි. ඔබ මගේ රැජින සහ මගේ සදාකාලික හිමිකාරියයි.)";
            let i = 0;
            function type() {
                if(i < en.length) { document.getElementById('en-letter').innerHTML += en.charAt(i); i++; setTimeout(type, 50); }
                else { document.getElementById('si-letter').innerText = si; }
            }
            type();
        }

        // Touch Heart Animation
        function createHeart(e) {
            const heart = document.createElement('div');
            heart.className = 'click-heart';
            heart.innerHTML = '❤️';
            heart.style.left = e.clientX + 'px';
            heart.style.top = e.clientY + 'px';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 1000);
        }

        function showChat() {
            document.getElementById('main-content').style.display = 'none';
            document.getElementById('chat-page').style.display = 'block';
            document.getElementById('chat-page').style.opacity = '1';
            loadMessages();
            setInterval(loadMessages, 3000);
        }

        function backToMain() {
            document.getElementById('chat-page').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
        }

        async function sendChat() {
            const input = document.getElementById('chat-input');
            if(!input.value.trim()) return;
            await fetch(DB_URL, { method: 'POST', body: JSON.stringify({ sender: currentUser, text: input.value, time: Date.now() }) });
            input.value = "";
            loadMessages();
        }

        async function loadMessages() {
            const res = await fetch(DB_URL);
            const data = await res.json();
            const display = document.getElementById('chat-display');
            if(data) {
                let html = "";
                Object.values(data).sort((a,b) => a.time - b.time).forEach(m => {
                    const isMe = m.sender === currentUser;
                    html += `<div class="msg ${isMe ? 'my-msg' : 'other-msg'}"><b>${m.sender}:</b> ${m.text}</div>`;
                });
                display.innerHTML = html;
                display.scrollTop = display.scrollHeight;
            }
        }
    </script>
</body>
</html>
