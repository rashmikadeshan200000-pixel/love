<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Love App v5.0 ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; outline: none; }
        body { 
            font-family: 'Poppins', sans-serif; margin: 0; overflow: hidden; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; background: radial-gradient(circle, #250000 0%, #000000 100%);
            cursor: crosshair;
        }

        /* Floating Words */
        .floating-word { 
            position: absolute; color: #ffd700; font-family: 'Dancing Script', cursive; 
            font-size: 1.8rem; pointer-events: none; z-index: 1; 
            text-shadow: 2px 2px 10px #ff0000, -1px -1px 0 #000;
            animation: floatUp 8s linear forwards;
        }
        @keyframes floatUp {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translateY(-10vh) rotate(20deg); opacity: 0; }
        }

        /* Love Meter Overlay */
        #love-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 2000;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            color: white; text-align: center;
        }
        #love-status { font-family: 'Dancing Script'; font-size: 2rem; color: #ff3333; margin-bottom: 10px; }
        #love-number { font-size: 5rem; font-weight: bold; color: white; text-shadow: 0 0 20px #f00; }

        .box-card { 
            background: rgba(15, 0, 0, 0.95); padding: 25px; border-radius: 35px; 
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.3); border: 1px solid #500; 
            text-align: center; width: 92%; max-width: 400px; z-index: 10;
            color: white; transition: 0.5s;
        }

        #login-box, #main-content, #chat-page { position: absolute; }
        /* පරණ Display logic එක තියාගමු */
        #main-content, #chat-page { display: none; opacity: 0; }

        .timer { font-size: 13px; color: #ff4d6d; margin: 10px 0; font-weight: bold; }
        .photo-frame {
            width: 170px; height: 210px; margin: 0 auto 10px; border: 5px solid white;
            border-radius: 10px; overflow: hidden; transform: rotate(-2deg); box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        /* මෙතන id="loveImage" ඇඩ් කරලා තියෙන්නේ */
        .photo-frame img { width: 100%; height: 100%; object-fit: cover; }

        .letter-text { font-size: 13px; text-align: left; border-left: 2px solid #f00; padding-left: 10px; font-style: italic; color: #ffcccc; margin-bottom: 15px; min-height: 80px; }
        input { width: 85%; padding: 12px; border-radius: 20px; border: 1px solid #600; background: #000; color: white; margin-bottom: 12px; text-align: center; }
        .btn-row { display: flex; gap: 8px; justify-content: center; margin-bottom: 10px; }
        button { padding: 10px 20px; background: #900; color: white; border: none; border-radius: 25px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 12px; }
        
        #chat-display { height: 240px; overflow-y: auto; background: rgba(0,0,0,0.8); border-radius: 15px; padding: 10px; margin-bottom: 10px; display: flex; flex-direction: column; gap: 8px; border: 1px solid #300; }
        .msg { padding: 8px 12px; border-radius: 15px; font-size: 13px; max-width: 85%; line-height: 1.4; }
        .my-msg { background: linear-gradient(to right, #900, #500); align-self: flex-end; }
        .other-msg { background: #222; align-self: flex-start; color: #ffaaaa; border: 1px solid #444; }
    </style>
</head>
<body>

    <audio id="bgMusic" loop><source src="music.mp3" type="audio/mpeg"></audio>

    <div id="love-overlay">
        <div id="love-status">Scanning Hearts...</div>
        <div id="love-number">0%</div>
        <button onclick="closeMeter()" id="close-meter-btn" style="display:none; margin-top:20px; background:#f00;">Close Result</button>
    </div>

    <div id="login-box" class="box-card">
        <h2 style="font-family: 'Dancing Script'; font-size: 2.2rem; color: #ff3333;">Love Terminal v5.0</h2>
        <input type="password" id="pcode" placeholder="Enter Secret Name...">
        <button onclick="login()">INITIALIZE LOVE</button>
    </div>

    <div id="main-content" class="box-card">
        <div class="timer" id="timer">Loading Love...</div>
        <div class="photo-frame">
            <img id="loveImage" src="" alt="Our Memory">
        </div>
        <div class="letter-text" id="letter">Initializing heart connection...</div>
        <div class="btn-row">
            <button onclick="changePhoto()">Next Memory</button>
            <button onclick="showMeter()">Love %</button>
        </div>
        <button onclick="goToChat()" style="width:100%; margin-top:5px; background:#440000;">OPEN SECURE CHAT</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyBLpLXvC-mVEcA15jPgPsL7UaphpyZ648o",
            authDomain: "love-chat-a2ddc.firebaseapp.com",
            databaseURL: "https://love-chat-a2ddc-default-rtdb.firebaseio.com",
            projectId: "love-chat-a2ddc",
            storageBucket: "love-chat-a2ddc.firebasestorage.app"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Database එකෙන් ෆොටෝ එක අරන් පෙන්නන එක
        database.ref('currentPhoto').on('value', (snapshot) => {
            const data = snapshot.val();
            if(data && data.imageUrl) {
                const imgElement = document.getElementById('loveImage');
                if(imgElement) {
                    imgElement.src = data.imageUrl;
                    imgElement.style.display = 'block'; // Photo එක පෙන්නන්න
                    imgElement.classList.add('active');
                }
            }
        });

        // උඹේ පරණ Login සහ අනිත් Functions ටික මෙතනින් පහළට දාපන්
        function login() {
            // උඹේ පරණ login code එක මෙතනට දාන්න
            document.getElementById('login-box').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            document.getElementById('main-content').style.opacity = '1';
        }
        
        // අනෙක් functions (createHeart, showMeter, etc.) ටිකත් මෙතනම තියාගන්න
    </script>
</body>
</html>
