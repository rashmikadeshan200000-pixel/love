<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Princess Amasha ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #fff0f6 0%, #ffdeeb 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
            touch-action: none; /* Mobile touch effects වලට */
        }

        /* Login Box */
        #login-box {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 40px;
            box-shadow: 0 15px 40px rgba(255, 105, 180, 0.2);
            z-index: 100;
        }

        input {
            padding: 12px;
            width: 220px;
            border: 2px solid #ff85a2;
            border-radius: 20px;
            margin-bottom: 20px;
            outline: none;
            text-align: center;
        }

        button {
            padding: 10px 30px;
            background: #ff4d6d;
            color: white;
            border: none;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Main Content */
        #main-content {
            display: none;
            width: 100%;
            z-index: 10;
        }

        .teddy-animation {
            font-size: 50px;
            margin-bottom: 10px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .photo-container {
            width: 280px;
            height: 330px;
            margin: 0 auto;
            border: 10px solid white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .photo-container img.active { display: block; animation: zoomIn 1s; }

        .romantic-text {
            font-family: 'Dancing Script', cursive;
            color: #ff4d6d;
            font-size: 2.2rem;
            margin-top: 15px;
        }

        /* Touch Heart Effect */
        .touch-heart {
            position: absolute;
            color: #ff4d6d;
            font-size: 25px;
            pointer-events: none;
            animation: fadeOutUp 1s forwards;
            z-index: 999;
        }

        @keyframes fadeOutUp {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: translateY(-50px) scale(1.5); }
        }

        @keyframes zoomIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body onclick="createHeart(event)" ontouchstart="createHeart(event)">

    <audio id="mySong" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div id="login-box">
        <div style="font-size: 40px;">🧸</div>
        <h2 style="color: #ff4d6d;">Hey Amasha! ✨</h2>
        <input type="password" id="pass" placeholder="Enter Secret Code...">
        <br>
        <button onclick="unlock()">Unlock Surprise</button>
    </div>

    <div id="main-content">
        <div class="teddy-animation">🧸💖🐻</div>
        <div class="photo-container">
            <img src="img1.jpg" class="active">
            <img src="img2.jpg">
            <img src="img3.jpg">
        </div>
        <div class="romantic-text" id="type-text"></div>
        <div style="color: #ff85a2; letter-spacing: 2px; margin-top: 5px;">MY PRECIOUS PRINCESS</div>
    </div>

    <script>
        function unlock() {
            const code = document.getElementById('pass').value;
            if (code === "Amasha") {
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                document.getElementById('mySong').play();
                startSlideshow();
                typeWriter("You are my whole world...", 0);
            }
        }

        // Fingerprint/Touch Effect
        function createHeart(e) {
            const x = e.clientX || e.touches[0].clientX;
            const y = e.clientY || e.touches[0].clientY;
            
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.className = 'touch-heart';
            heart.style.left = (x - 10) + 'px';
            heart.style.top = (y - 10) + 'px';
            document.body.appendChild(heart);
            
            setTimeout(() => heart.remove(), 1000);
        }

        function typeWriter(text, i) {
            if (i < text.length) {
                document.getElementById("type-text").innerHTML += text.charAt(i);
                setTimeout(() => typeWriter(text, i + 1), 150);
            }
        }

        function startSlideshow() {
            const imgs = document.querySelectorAll('.photo-container img');
            let current = 0;
            setInterval(() => {
                imgs[current].classList.remove('active');
                current = (current + 1) % imgs.length;
                imgs[current].classList.add('active');
            }, 4000);
        }
    </script>
</body>
</html>
