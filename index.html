<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Love App v5.0 ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; outline: none; }
        body { 
            font-family: 'Poppins', sans-serif; margin: 0; overflow: hidden; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; background: radial-gradient(circle, #250000 0%, #000000 100%);
            cursor: crosshair;
        }

        /* Floating Words */
        .floating-word { 
            position: absolute; color: #ffd700; font-family: 'Dancing Script', cursive; 
            font-size: 1.5rem; pointer-events: none; z-index: 1; 
            text-shadow: 2px 2px 10px #ff0000, -1px -1px 0 #000;
            animation: floatUp 8s linear forwards;
        }
        @keyframes floatUp {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translateY(-10vh) rotate(20deg); opacity: 0; }
        }

        .box-card { 
            background: rgba(15, 0, 0, 0.95); padding: 25px; border-radius: 35px; 
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.3); border: 1px solid #500; 
            text-align: center; width: 92%; max-width: 400px; z-index: 10;
            color: white; transition: 0.5s; position: absolute;
        }

        #main-content, #chat-page { display: none; opacity: 0; }

        .timer { font-size: 16px; color: #ff4d6d; margin: 15px 0; font-weight: bold; }
        .photo-frame {
            width: 170px; height: 210px; margin: 0 auto 10px; border: 5px solid white;
            border-radius: 10px; overflow: hidden; transform: rotate(-2deg); background: #111;
        }
        .photo-frame img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .photo-frame img.active { display: block; animation: fadeIn 1.5s; }

        /* Chat Styles */
        #chat-display { height: 250px; overflow-y: auto; background: rgba(0,0,0,0.5); border-radius: 15px; padding: 10px; margin-bottom: 10px; display: flex; flex-direction: column; gap: 8px; border: 1px solid #300; }
        .msg { padding: 8px 12px; border-radius: 15px; font-size: 13px; max-width: 80%; line-height: 1.4; word-wrap: break-word; }
        .my-msg { background: linear-gradient(to right, #900, #500); align-self: flex-end; text-align: right; }
        .other-msg { background: #222; align-self: flex-start; color: #ffaaaa; border: 1px solid #444; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        input { width: 85%; padding: 12px; border-radius: 20px; border: 1px solid #600; background: #000; color: white; margin-bottom: 12px; text-align: center; }
        button { padding: 10px 20px; background: #900; color: white; border: none; border-radius: 25px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 12px; }
    </style>
</head>
<body onclick="createHeart(event)">

    <audio id="bgMusic" loop></audio>

    <div id="login-box" class="box-card">
        <h2 style="font-family: 'Dancing Script'; font-size: 2.2rem; color: #ff3333;">Love Terminal v5.0</h2>
        <input type="password" id="pcode" placeholder="Enter Secret Name...">
        <button onclick="login()">INITIALIZE LOVE</button>
    </div>

    <div id="main-content" class="box-card">
        <div class="timer" id="timer">0 Days : 0h : 0m : 0s</div>
        <div class="photo-frame"><img id="loveImage" src="" alt="Memory"></div>
        <div style="font-size: 13px; font-style: italic; color: #ffcccc; margin-bottom: 15px;">"Together forever..." ❤️</div>
        <button onclick="goToChat()" style="width:100%; background:#440000;">OPEN SECURE CHAT</button>
    </div>

    <div id="chat-page" class="box-card">
        <h3 style="font-family: 'Dancing Script'; color: #ff3333;">Secret Love Chat</h3>
        <div id="chat-display"></div>
        <div style="display: flex; gap: 5px;">
            <input type="text" id="chatInput" placeholder="Type a message..." style="margin-bottom: 0; flex: 1;">
            <button onclick="sendMessage()" style="border-radius: 50%; width: 45px; height: 45px;">✈️</button>
        </div>
        <button onclick="backToMain()" style="margin-top: 10px; background: transparent; color: #666; font-size: 10px;">Back</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBLpLXvC-mVEcA15jPgPsL7UaphpyZ648o",
            authDomain: "love-chat-a2ddc.firebaseapp.com",
            databaseURL: "https://love-chat-a2ddc-default-rtdb.firebaseio.com",
            projectId: "love-chat-a2ddc",
            storageBucket: "love-chat-a2ddc.firebasestorage.app"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let currentUser = ""; // Login වෙද්දී මෙයා කවුද කියලා බලාගන්නවා

        // 2025-11-27 ටයිමර් එක
        function updateTimer() {
            const diff = new Date() - new Date("2025-11-27T00:00:00");
            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff / 3600000) % 24);
            const m = Math.floor((diff / 60000) % 60);
            const s = Math.floor((diff / 1000) % 60);
            document.getElementById('timer').innerText = `${d} Days : ${h}h : ${m}m : ${s}s`;
        }

        // Photo Update
        database.ref('currentPhoto').on('value', (snap) => {
            const data = snap.val();
            if(data) { const img = document.getElementById('loveImage'); img.src = data.imageUrl; img.style.display = 'block'; img.classList.add('active'); }
        });

        // Chat Logic
        function goToChat() {
            document.getElementById('main-content').style.display = 'none';
            document.getElementById('chat-page').style.display = 'block';
            document.getElementById('chat-page').style.opacity = '1';
        }

        function backToMain() {
            document.getElementById('chat-page').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
        }

        function sendMessage() {
            const msg = document.getElementById('chatInput').value;
            if(!msg) return;
            database.ref('messages').push({ user: currentUser, text: msg, time: Date.now() });
            document.getElementById('chatInput').value = "";
        }

        database.ref('messages').limitToLast(20).on('value', (snap) => {
            const display = document.getElementById('chat-display');
            display.innerHTML = "";
            snap.forEach((child) => {
                const data = child.val();
                const div = document.createElement('div');
                div.className = `msg ${data.user === currentUser ? 'my-msg' : 'other-msg'}`;
                div.innerText = data.text;
                display.appendChild(div);
            });
            display.scrollTop = display.scrollHeight;
        });

        function login() {
            currentUser = document.getElementById('pcode').value;
            if(currentUser) {
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                document.getElementById('main-content').style.opacity = '1';
                document.getElementById('bgMusic').src = "music.mp3";
                document.getElementById('bgMusic').play();
                setInterval(updateTimer, 1000);
            }
        }

        function createHeart(e) {
            const h = document.createElement('div'); h.innerHTML = '❤️'; h.style.position = 'absolute'; h.style.left = e.clientX+'px'; h.style.top = e.clientY+'px';
            document.body.appendChild(h); setTimeout(() => h.remove(), 1000);
        }
    </script>
</body>
</html>
